apiVersion: apps/v1
kind: Deployment
metadata:
  name: main-frontend-deployment
  labels:
    app: main-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: main-frontend
  template:
    metadata:
      labels:
        app: main-frontend
    spec:
      containers:
      - name: main-frontend
        image: 295129427067.dkr.ecr.us-east-1.amazonaws.com/shopping-site-main:6f2409c9c3b2cd71f54aaaebdc03263d8da369f4
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: main-service
  labels:
    app: main-frontend
spec:
  type: ClusterIP
  selector:
    app: main-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
